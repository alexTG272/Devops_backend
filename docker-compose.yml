services:

  backend-ventas:
    image: ferxys/innovatech-ventas:latest
    container_name: api_ventas
    restart: always
    ports:
      - "8001:8080"
    environment:
      - SPRING_DATASOURCE_URI=jdbc:mysql://10.0.2.177/innovatech_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}

  backend-despachos:
    image: ferxys/innovatech-despachos:latest
    container_name: api_despachos
    restart: always
    ports:
      - "8002:8080"
    environment:
      - SPRING_DATASOURCE_URI=jdbc:mysql://10.0.2.177/innovatech_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}